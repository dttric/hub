    <style>
        * {
            overflow: hidden;
        }
        body {
            overflow: auto;
        }
        .no-select {
            user-select: none;
        }
        #animated-bg {
            display: none;
            position: fixed;
            right: 0;
            top: 0;
            width: calc(100% - 280px);
            height: 100vh;
            background-image: 
                linear-gradient(90deg, rgba(110, 168, 254, 0.15) 1px, transparent 1px),
                linear-gradient(rgba(110, 168, 254, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: slide 8s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slide {
            0% { background-position: 0 0; }
            100% { background-position: 50% 50%; }
        }

        @keyframes dvd-bounce-1 {
            0% { transform: translate(0, 0); }
            25% { transform: translate(100px, 150px); }
            50% { transform: translate(-100px, 250px); }
            75% { transform: translate(150px, -100px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes dvd-bounce-2 {
            0% { transform: translate(-80px, 50px); }
            25% { transform: translate(120px, 200px); }
            50% { transform: translate(-150px, -50px); }
            75% { transform: translate(80px, 180px); }
            100% { transform: translate(-80px, 50px); }
        }

        @keyframes dvd-bounce-3 {
            0% { transform: translate(50px, -100px); }
            25% { transform: translate(-120px, 100px); }
            50% { transform: translate(140px, 180px); }
            75% { transform: translate(-80px, -150px); }
            100% { transform: translate(50px, -100px); }
        }

        @keyframes dvd-bounce-4 {
            0% { transform: translate(90px, 150px); }
            25% { transform: translate(-110px, -100px); }
            50% { transform: translate(95px, -180px); }
            75% { transform: translate(-140px, 120px); }
            100% { transform: translate(90px, 150px); }
        }

        @keyframes dvd-bounce-5 {
            0% { transform: translate(-100px, -80px); }
            25% { transform: translate(130px, 120px); }
            50% { transform: translate(-70px, 200px); }
            75% { transform: translate(110px, -120px); }
            100% { transform: translate(-100px, -80px); }
        }

        #mainpart {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .nicknameHeader {
            font-size: 60px;
            user-select: none;
        }

        
        #gif-container {
        display: none;

            .video-element video {

            .video-1 {

            .video-2 {

    <script>
        const mediaList = [
        'gifs/animation.gif.mp4',
        'gifs/creation-of-adam-cat.mp4',
        'gifs/doc_2026-02-22_14-22-40.mp4',
        'gifs/doc_2026-02-22_14-23-00.mp4',
        'gifs/думайте-поздняков.mp4'
        ];

        function loadAllMedia() {
            const container = $('#gif-container');
            mediaList.forEach((video, index) => {
                const videoEl = $('<div class="video-element video-' + (index + 1) + '"><video autoplay muted loop playsinline><source src="' + video + '" type="video/mp4"></video></div>');
                container.append(videoEl);
            });
        }

        $(document).ready(function() {
            if (window.innerWidth > 991) {
                loadAllMedia();
            }
        });
    </script>
